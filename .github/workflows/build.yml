name: Build TweakLoader
# force run
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Theos
        uses: Randomblock1/theos-action@v1
        with:
          theos-sdks: "https://github.com/theos/sdks"

      - name: Ensure iOS SDK 16.5
        run: |
          set -euo pipefail
          echo "THEOS=$THEOS"
          mkdir -p "$THEOS/sdks"
          if [ ! -d "$THEOS/sdks/iPhoneOS16.5.sdk" ]; then
            curl -L --retry 5 -o /tmp/iPhoneOS16.5.sdk.tar.xz \
              https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS16.5.sdk.tar.xz
            tar -xf /tmp/iPhoneOS16.5.sdk.tar.xz -C "$THEOS/sdks"
          fi
          ls -la "$THEOS/sdks"

      - name: Install tools
        run: |
          brew install ldid make || true
          echo "$(brew --prefix make)/libexec/gnubin" >> "$GITHUB_PATH"
          which make
          make --version | head -n 2

      - name: Diagnose project
        run: |
          set -euo pipefail
          pwd
          ls -la
          ls -la SpringBoardTweak
          cat Makefile
          cat SpringBoardTweak/Makefile
          cat control

      - name: Build arm64 TweakLoader
        run: |
          set -euo pipefail
          export THEOS="${THEOS:-$HOME/theos}"
          export PATH="$(brew --prefix make)/libexec/gnubin:$PATH"
          echo "THEOS=$THEOS"
          # Build subproject first, then main library
          make -C SpringBoardTweak clean || true
          make -C SpringBoardTweak \
            TARGET="iphone:clang:16.5:15.0" \
            ARCHS=arm64 \
            FINALPACKAGE=0 \
            STRIP=0 \
            GO_EASY_ON_ME=1
          echo "SpringBoardTweak outputs:"
          find SpringBoardTweak/.theos -type f -name "*.dylib" -print || true
          # Ensure parent makefile can find SB tweak dylib path
          SB_DYLIB=$(find SpringBoardTweak/.theos -type f -name "SpringBoardTweak.dylib" | head -n 1)
          if [ -z "$SB_DYLIB" ]; then
            echo "SpringBoardTweak.dylib not produced"
            find SpringBoardTweak -maxdepth 4 -type f | sed -n "1,200p"
            exit 1
          fi
          echo "SB_DYLIB=$SB_DYLIB"
          # Build TweakLoader, injecting SB dylib section from found path
          make clean || true
          make \
            TARGET="iphone:clang:16.5:15.0" \
            ARCHS=arm64 \
            FINALPACKAGE=0 \
            STRIP=0 \
            GO_EASY_ON_ME=1 \
            TweakLoader_LDFLAGS="-sectcreate __TEXT __SBTweak $SB_DYLIB"
          echo "All dylibs:"
          find . -type f -name "*.dylib" -print

      - name: Collect artifacts
        run: |
          set -euo pipefail
          mkdir -p dist
          TL=$(find .theos -type f -name "TweakLoader.dylib" | head -n 1 || true)
          if [ -z "$TL" ]; then
            TL=$(find . -type f -name "TweakLoader.dylib" | head -n 1 || true)
          fi
          if [ -z "$TL" ]; then
            echo "TweakLoader.dylib missing"
            find . -type f | sed -n "1,300p"
            exit 1
          fi
          cp -f "$TL" dist/TweakLoader_arm64.dylib
          SB=$(find . -type f -name "SpringBoardTweak.dylib" | head -n 1 || true)
          if [ -n "$SB" ]; then
            cp -f "$SB" dist/SpringBoardTweak_arm64.dylib
          fi
          ls -lah dist
          file dist/* || true
          # basic size sanity
          SIZE=$(stat -f%z dist/TweakLoader_arm64.dylib)
          echo "size=$SIZE"
          if [ "$SIZE" -lt 50000 ]; then
            echo "dylib too small"
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TweakLoader-dylibs
          path: dist/*
          if-no-files-found: error
